<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Cube - Rubik's Cube Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #1a1a2e;
            font-family: Arial, sans-serif;
        }
        #game-container {
            width: 100vw;
            height: 100vh;
            border: none;
        }
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 1.5em;
            text-align: center;
        }
        .loading::after {
            content: "";
            display: block;
            width: 40px;
            height: 40px;
            margin: 20px auto;
            border: 4px solid #3498db;
            border-top: 4px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">Loading The Cube...</div>
    <iframe id="game-container" style="display:none;"></iframe>

    <script>
        // Load the game from the original URL
        window.onload = function() {
            var iframe = document.getElementById('game-container');
            var loading = document.getElementById('loading');

            iframe.src = 'https://bsehovac.github.io/the-cube/';
            iframe.style.display = 'block';
            loading.style.display = 'none';
        };
    </script>
</body>
</html>
