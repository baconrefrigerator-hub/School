<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basket Random - 100% Physics Clone</title>
    <!-- Retro Arcade Font Integration -->
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-wrapper">
        <!-- Exact HUD UI overlay tracking scores up to 5 points -->
        <div id="hud">
            <div class="team p1-team">
                <div class="team-name">PLYR 1</div>
                <div id="p1-score" class="score">0</div>
            </div>
            <div id="game-status">VS</div>
            <div class="team p2-team">
                <div class="team-name">PLYR 2</div>
                <div id="p2-score" class="score">0</div>
            </div>
        </div>

        <!-- HTML5 Canvas rendering engine frame -->
        <canvas id="stage" width="1000" height="550"></canvas>

        <!-- Match Overlay notifications -->
        <div id="overlay" class="hidden">
            <h1 id="match-banner">PLAYER 1 SCORES!</h1>
            <p id="sub-banner">MATCH RESETTING...</p>
        </div>
    </div>

    <!-- Core Engine Scripts -->
    <script src="game.js"></script>
</body>
</html>
